# HAProxy — répartit le trafic SOCKS5 sur le pool d'instances Tor.
# Découverte automatique des réplicas via le DNS interne de Docker (127.0.0.11).
# Monter en charge = augmenter le nombre de réplicas du service "tor".

global
    log stdout format raw local0
    maxconn 4096

defaults
    mode tcp
    log global
    timeout connect 10s
    timeout client  120s
    timeout server  120s

# Résolveur = DNS embarqué de Docker
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry  1s
    hold valid 10s

# Endpoint SOCKS unique exposé à l'application
frontend socks_in
    bind *:9050
    default_backend tor_pool

# Round-robin sur toutes les instances Tor découvertes via DNS
backend tor_pool
    balance roundrobin
    # 30 emplacements max : les réplicas "tor" sont résolus dynamiquement
    server-template tor 30 tor:9050 check resolvers docker init-addr none
